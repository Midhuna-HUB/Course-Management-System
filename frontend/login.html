<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login | CourseHub</title>
</head>

<body style="margin:0; font-family:Segoe UI, sans-serif; background:#0f172a; color:white;">

<!-- NAVBAR -->
<div style="
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    background:linear-gradient(90deg,#4f46e5,#06b6d4);
">
    <h2 style="margin:0;">🎓 CourseHub</h2>
    <div>
        <a href="index.html" style="color:white; text-decoration:none; margin:0 12px;">Home</a>
        <a href="courses.html" style="color:white; text-decoration:none; margin:0 12px;">Courses</a>
        <a href="register.html" style="color:white; text-decoration:none; margin:0 12px;">Register</a>
    </div>
</div>

<!-- LOGIN SECTION -->
<div style="
    height:85vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    linear-gradient(rgba(15,23,42,0.8),rgba(15,23,42,0.9)),
    url('https://images.unsplash.com/photo-1513258496099-48168024aec0') center/cover;
">

    <div style="
        width:360px;
        padding:35px;
        background:#1f2937;
        border-radius:18px;
        box-shadow:0 10px 30px rgba(0,0,0,0.5);
        text-align:center;
    ">
        <h2 style="margin-bottom:10px;">Welcome Back 👋</h2>
        <p style="color:#9ca3af; margin-bottom:25px;">
            Login to continue your learning journey
        </p>

        <input type="text" placeholder="Username or Email"
            style="
                width:100%;
                padding:12px;
                margin-bottom:15px;
                border:none;
                border-radius:10px;
                outline:none;
                background:#374151;
                color:white;
            ">

        <input type="password" placeholder="Password"
            style="
                width:100%;
                padding:12px;
                margin-bottom:20px;
                border:none;
                border-radius:10px;
                outline:none;
                background:#374151;
                color:white;
            ">

        <button
            style="
                width:100%;
                padding:12px;
                border:none;
                border-radius:12px;
                background:linear-gradient(90deg,#22c55e,#16a34a);
                color:black;
                font-weight:bold;
                cursor:pointer;
                font-size:15px;
            ">
            Login
        </button>

        <p style="margin-top:18px; color:#9ca3af;">
            Don’t have an account?
            <a href="register.html" style="color:#38bdf8; text-decoration:none;">
                Register
            </a>
        </p>
    </div>

</div>

<!-- FOOTER -->
<div style="
    text-align:center;
    padding:15px;
    background:#0f172a;
    color:#94a3b8;
">
    © 2026 CourseHub | Student Course Management System
</div>

</body>
</html>
