<!DOCTYPE html>
<html lang="en">

<head>
<title>Login | CourseHub</title>

<style>

body{
margin:0;
font-family:Segoe UI,sans-serif;
background:#0f172a;
color:white;
}


.navbar{

display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:linear-gradient(90deg,#4f46e5,#06b6d4);

}


.navbar a{

color:white;
text-decoration:none;
margin:0 12px;

}


.container{

height:85vh;
display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(rgba(15,23,42,.8),rgba(15,23,42,.9)),
url("https://images.unsplash.com/photo-1513258496099-48168024aec0")
center/cover;

}



.card{

width:360px;
padding:35px;
background:#1f2937;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,.5);
text-align:center;

}



input{

width:100%;
padding:12px;
margin-bottom:15px;
border:none;
border-radius:10px;
background:#374151;
color:white;
outline:none;

}



button{

width:100%;
padding:12px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#22c55e,#16a34a);
font-weight:bold;
cursor:pointer;

}


a{

color:#38bdf8;
text-decoration:none;

}


</style>

</head>



<body>



<div class="navbar">

<h2>🎓 CourseHub</h2>


<div>

<a href="index.html">
Home
</a>

<a href="browse-courses.html">
Courses
</a>

<a href="register.html">
Register
</a>

</div>


</div>




<div class="container">


<div class="card">


<h2>
Welcome Back 👋
</h2>


<p style="color:#9ca3af;">
Login to continue your learning journey
</p>



<input type="text"
placeholder="Username or Email">



<input type="password"
placeholder="Password">



<div style="
text-align:right;
margin-bottom:20px;
">

<a href="forgot-password.html">
Forgot Password?
</a>

</div>



<button>
Login
</button>



<p style="color:#9ca3af;margin-top:20px;">

Don't have an account?

<a href="register.html">
Register
</a>


</p>


</div>


</div>




<footer style="
text-align:center;
padding:15px;
color:#94a3b8;
">

© 2026 CourseHub | Student Course Management System

</footer>



</body>

</html>
