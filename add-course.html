<!DOCTYPE html>
<html lang="en">

<head>

<title>Add Course | CourseHub</title>


<style>

body{

margin:0;
font-family:Segoe UI,sans-serif;
background:#0f172a;
color:white;

}



.navbar{

display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:linear-gradient(90deg,#4f46e5,#06b6d4);

}



.navbar a{

color:white;
text-decoration:none;
margin:0 12px;

}




.container{

height:85vh;
display:flex;
justify-content:center;
align-items:center;

}



.card{

width:420px;
padding:35px;
background:#1f2937;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,.5);

text-align:center;

}





input,textarea,select{

width:100%;
padding:12px;
margin-bottom:15px;

border:none;
border-radius:10px;

background:#374151;
color:white;
outline:none;

}



textarea{

height:100px;
resize:none;

}



button{

width:100%;
padding:12px;

border:none;
border-radius:12px;

background:
linear-gradient(90deg,#22c55e,#16a34a);

font-weight:bold;
cursor:pointer;

}



a{

color:#38bdf8;
text-decoration:none;

}


</style>


</head>


<body>




<div class="navbar">


<h2>
🎓 CourseHub Admin
</h2>



<div>

<a href="admin-dashboard.html">
Dashboard
</a>


<a href="courses.html">
Courses
</a>


</div>


</div>







<div class="container">


<div class="card">


<h2>
➕ Add New Course
</h2>


<p style="color:#94a3b8;">
Create a new learning course
</p>




<input type="text"
placeholder="Course Name">



<select>

<option>
Select Category
</option>

<option>
Web Development
</option>

<option>
Programming
</option>

<option>
Data Science
</option>

<option>
AI & Machine Learning
</option>

</select>




<textarea placeholder="Course Description"></textarea>




<input type="text"
placeholder="Course Duration">





<input type="text"
placeholder="Instructor Name">





<a href="courses.html">

<button>
Add Course
</button>

</a>




</div>


</div>





<footer style="
text-align:center;
padding:20px;
color:#94a3b8;
">

© 2026 CourseHub | Admin Panel

</footer>



</body>

</html>
